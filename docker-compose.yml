version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: absensi-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: db_absensi
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: absensi-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/db_absensi
      - JWT_SECRET=rahasia_absensi_super_secret_2026
    depends_on:
      - mongodb
    volumes:
      - ./backend/uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: absensi-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data:
